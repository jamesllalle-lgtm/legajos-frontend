<h2 mat-dialog-title class="title">{{data.title}}</h2>
<div mat-dialog-content>
  <form [formGroup]="FormGroup" class="example-form col-12 float-left" enctype="multipart/form-data">

      <mat-form-field class="col-12 float-left" appearance="fill">
        <mat-label class="font-comp">Centro de Registro</mat-label>
        <mat-select name="regimended_for" class="font-comp" formControlName="centroControl" >
          <mat-option [value]="0" (click)="customerOnChange(null, 1)"> Seleccione...</mat-option>
          <mat-option *ngFor="let option of lstserv.lCentroRegistro" [value]="option.nIntCodigo" (click)="customerOnChange(option, 1)">
            {{ option.cIntDescripcion.toUpperCase() }}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field class="example-full-width" class="col-12 float-left">
        <mat-label class="font-comp">Codigo Investigador Renacyt</mat-label>
        <input matInput name="direccion" maxlength="50" value="" class="col-l font-comp" formControlName="nroRegistroControl" required >
      </mat-form-field>
      <mat-form-field class="col-12 float-left" appearance="fill">
        <mat-label class="font-comp">Nivel Investigador Renacyt </mat-label>
        <mat-select name="regimended_for2" class="font-comp" formControlName="nivelRenacytControl" >
          <mat-option [value]="0" (click)="customerOnChange(null, 2)"> Seleccione...</mat-option>
          <mat-option *ngFor="let option of lstserv.lNivelRenacyt" [value]="option.nIntCodigo" (click)="customerOnChange(option, 2)">
            {{ option.cIntDescripcion.toUpperCase() }}
          </mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field appearance="fill" class="col-12 float-left">
        <mat-label class="font-comp">Fecha Inicio</mat-label>
        <!-- [min]="datepast" -->
        <input class="font-comp col-12" [min]="fecha_minima" matInput [matDatepicker]="dpI"  [formControl]="dateFecIni"   [max]="today" readonly />
        <mat-datepicker-toggle matSuffix [for]="dpI"></mat-datepicker-toggle>
        <mat-datepicker #dpI disabled="false"></mat-datepicker>
      </mat-form-field>
    <mat-form-field appearance="fill" class="col-12 float-left">
      <mat-label class="font-comp">Fecha Fin</mat-label>
      <!-- [min]="datepast" -->
      <input class="font-comp col-12" matInput [matDatepicker]="dpF"  [formControl]="dateFecFin"   [max]="today" readonly />
      <mat-datepicker-toggle matSuffix [for]="dpF"></mat-datepicker-toggle>
      <mat-datepicker #dpF disabled="false"></mat-datepicker>
    </mat-form-field>
    <mat-form-field class="col-12 float-left subir-2" appearance="standard">
      <mat-label>Adjuntar archivo(png, jpg, jpeg, pdf)</mat-label>
      <ngx-mat-file-input class="file-input" placeholder="Adjuntar archivo(png, jpg, jpeg, pdf)" (change)="fileProgress($event)" [accept]="'image/png, image/jpeg, application/pdf'"></ngx-mat-file-input>
      <mat-icon matSuffix>insert_photo</mat-icon>
      <small *ngIf="erradjunto"  id="adjuntoHelp" class="form-text text-muted msj-chk small-msj" ><i class="far fa-check-circle"></i> Se cargó imágen.</small>
    </mat-form-field>
  </form>
</div>
<div mat-dialog-actions class="apbtn col-12 float-left">
  <button class="btn btn-sm btn-primary btn-uq" mat-button (click)="guardar($event)" >Aceptar</button>
  <button class="btn btn-sm btn-default btn-uq" mat-button (click)="configserv.onNoClickDialog(dialogRef)">Cancelar</button>
  <!-- cdkFocusInitial ->FOCUS -->
</div>
<app-mensaje></app-mensaje> <ngx-spinner></ngx-spinner>
